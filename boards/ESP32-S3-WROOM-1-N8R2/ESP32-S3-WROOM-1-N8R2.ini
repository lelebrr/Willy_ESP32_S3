[env:ESP32-S3-WROOM-1-N8R2]
board = ESP32-S3-DevKitC-1-N8R2
board_build.partitions = custom_8Mb.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
upload_port = COM3
board_build.flash_mode = qio
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
framework = arduino
build_type = release
lib_compat_mode = strict
lib_ldf_mode = deep+
board_build.variants_dir = boards
board_build.filesystem = littlefs
monitor_port = COM3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
monitor_dtr = 1
monitor_rts = 1
build_flags =
	-O2
	-flto
	-DNDEBUG
	-Wl,--strip-all
	-DWILLY_VERSION='"1.0.0"'
	-DCORE_DEBUG_LEVEL=4
	-DLV_TICK_CUSTOM=1
	-DARDUINO_RUNNING_CORE=1
	-DTFT_eSPI_VERSION=2.5.43
	-I lib/mquickjs_headers
	-DEEPROMSIZE=128
	-DLH=8
	-DLW=6
	-ffunction-sections
	-fdata-sections
	-Wl,--print-memory-usage
	-Wl,--gc-sections
	-Wl,--allow-multiple-definition
	-DGIT_COMMIT_HASH='"Homebrew"'
	-DFASTLED_RMT_BUILTIN_DRIVER=1
	-DCONFIG_ASYNC_TCP_STACK_SIZE=4096
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1
	-DCONFIG_ASYNC_TCP_USE_WDT=0
	-DGEN_MQJS_HEADERS
	-Iinclude
	-Isrc
	-Iboards/ESP32-S3-WROOM-1-N8R2
	-Ilib/HAL
	-I C:/Users/leleb/.platformio/packages/framework-arduinoespressif32/libraries/FS/src
	-I C:/Users/leleb/.platformio/packages/framework-arduinoespressif32/libraries/SPI/src
	-I C:/Users/leleb/.platformio/packages/framework-arduinoespressif32/libraries/SPIFFS/src
	-Ilib/TFT_eSPI
	-Ilib/TFT_eSPI
	-Wno-narrowing
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DRGB_LED=48
	-DHAS_RGB_LED=1
	-DLED_COUNT=1
	-DLED_TYPE=WS2812B
	-DLED_ORDER=GRB
	-DLED_COLOR_STEP=5
	-DLED_TYPE_IS_RGBW=0
	-DGROVE_SDA=8
	-DGROVE_SCL=17
	-DSPI_SCK_PIN=12
	-DSPI_MOSI_PIN=11
	-DSPI_MISO_PIN=13
	-DSPI_SS_PIN=10
	-DUSE_HSPI_PORT=1
	-DTFT_BL=3
	-DHAS_SCREEN=1
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DROTATION=1
	-DBACKLIGHT=3
	-DMINBRIGHT=160
	-DTFT_DISPON=0x29
	-DTFT_DISPOFF=0x28
	-DTFT_CS=10
	-DTFT_DC=9
	-DTFT_RST=14
	-DTFT_MOSI=11
build_src_filter = ${env.build_src_filter} +<../boards/ESP32-S3-WROOM-1-N8R2>
lib_deps = ${env.lib_deps}