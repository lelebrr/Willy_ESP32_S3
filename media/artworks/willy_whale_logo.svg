<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aquaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00AAAA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#008888;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Corpo da baleia -->
  <path d="M50 80 Q70 60 100 70 Q130 60 150 80 L160 90 Q140 100 120 95 Q100 100 80 95 Q60 100 40 90 Z"
        fill="url(#aquaGlow)" stroke="#00FFFF" stroke-width="2" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Olho -->
  <circle cx="110" cy="75" r="5" fill="#FFFFFF">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="112" cy="73" r="2" fill="#000000"/>

  <!-- Barbatana dorsal -->
  <path d="M90 70 L95 50 L100 70 Z" fill="#00FFFF" stroke="#00FFFF" stroke-width="1">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Texto WILLY -->
  <text x="100" y="130" text-anchor="middle" fill="#00FFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    WILLY
    <animate attributeName="fill" values="#00FFFF;#FFFFFF;#00FFFF" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>