<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .icon { stroke: #00FFFF; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .glow { filter: drop-shadow(0 0 5px #00FFFF); }
    </style>
  </defs>

  <!-- Ícone WiFi -->
  <g class="icon glow" transform="translate(50,50)">
    <path d="M0 10 Q10 0 20 10 Q10 5 0 10" />
    <path d="M5 15 Q10 10 15 15 Q10 12 5 15" />
    <path d="M8 18 Q10 16 12 18" />
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Ícone Bluetooth -->
  <g class="icon glow" transform="translate(150,50)">
    <path d="M10 0 L10 20 M5 5 L15 15 M5 15 L15 5" />
    <animateTransform attributeName="transform" type="translate" values="150,50;150,45;150,50" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- Ícone GPS -->
  <g class="icon glow" transform="translate(250,50)">
    <circle cx="10" cy="10" r="8" />
    <line x1="10" y1="2" x2="10" y2="6" />
    <line x1="10" y1="14" x2="10" y2="18" />
    <line x1="2" y1="10" x2="6" y2="10" />
    <line x1="14" y1="10" x2="18" y2="10" />
    <circle cx="10" cy="10" r="2" fill="#00FFFF" />
    <animate attributeName="stroke-dasharray" values="0,50;25,25;0,50" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Ícone Energia -->
  <g class="icon glow" transform="translate(350,50)">
    <path d="M10 0 L6 10 L14 10 Z M8 10 L12 10 L10 18 Z" />
    <animate attributeName="fill" values="none;#00FFFF;none" dur="1s" repeatCount="indefinite"/>
  </g>

  <!-- Legendas -->
  <text x="60" y="90" text-anchor="middle" fill="#00FFFF" font-size="12">WiFi</text>
  <text x="160" y="90" text-anchor="middle" fill="#00FFFF" font-size="12">Bluetooth</text>
  <text x="260" y="90" text-anchor="middle" fill="#00FFFF" font-size="12">GPS</text>
  <text x="360" y="90" text-anchor="middle" fill="#00FFFF" font-size="12">Power</text>
</svg>