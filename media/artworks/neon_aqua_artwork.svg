<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aquaGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#008888;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo gradiente -->
  <rect width="300" height="300" fill="url(#aquaGradient)" />

  <!-- Formas abstratas neon -->
  <path d="M50 50 Q100 20 150 50 Q200 20 250 50 Q250 100 200 130 Q150 160 100 130 Q50 160 50 100 Z"
        fill="none" stroke="#00FFFF" stroke-width="3" filter="url(#neonGlow)">
    <animate attributeName="stroke-dasharray" values="0,500;250,250;0,500" dur="4s" repeatCount="indefinite"/>
  </path>

  <circle cx="150" cy="150" r="50" fill="none" stroke="#00AAAA" stroke-width="2" filter="url(#neonGlow)">
    <animate attributeName="r" values="40;60;40" dur="3s" repeatCount="indefinite"/>
  </circle>

  <path d="M100 200 Q150 180 200 200 Q180 220 150 240 Q120 220 100 200"
        fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#neonGlow)">
    <animateTransform attributeName="transform" type="rotate" values="0 150 200;360 150 200" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Pontos de luz -->
  <circle cx="80" cy="80" r="3" fill="#FFFFFF" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="120" r="2" fill="#00FFFF" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="250" r="4" fill="#00AAAA" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Linhas dinâmicas -->
  <line x1="50" y1="150" x2="250" y2="150" stroke="#00FFFF" stroke-width="1" filter="url(#neonGlow)">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="150" y1="50" x2="150" y2="250" stroke="#00AAAA" stroke-width="1" filter="url(#neonGlow)">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="2.5s" repeatCount="indefinite"/>
  </line>
</svg>